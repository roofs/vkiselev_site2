{% extends "base.html" %}

{% block title %}{{ item.name }}{% endblock %}
{% block microformats %}
    <meta property="og:title" content="{{ item.name }}"/>
    <meta property="og:description" content="{{ item.og_desc }}"/>
    <meta property="og:image" content="http://{{ request.host }}{{ item.img }}"/>
{% endblock %}
{% block content %}
    <div class="container">
        {% include 'still_header.html' %}

        <div class="padding-top-big"></div>
        <div class="row">
            <div class="col-md-12">
                <p class="center-align">
                    <img id='myimg' src="{{ item.img }}" class="flat-img">
                    <script>
                        $('#myimg').click(function () {
                            if($(this).hasClass('flat-img')) {
                                $(this).addClass('flat-img-large');
                                $(this).removeClass('flat-img');
                            } else {
                               $(this).removeClass('flat-img-large');
                                $(this).addClass('flat-img');
                            }
                        });
                    </script>
                </p>
            </div>
        </div>
        <div class="row">
            <div class="col-md-3">
            </div>
            <div class="col-md-9">
                <p>
                    {{ item.desc | safe }}
                </p>

                <p>
                    {% include 'social_share.html' %}
                </p>
            </div>
{% endblock %}
