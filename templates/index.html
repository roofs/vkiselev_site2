{% extends "base.html" %}

{% block title %}Vasili Kiselev{% endblock %}
{% block content %}
    <div class="container-fluid">
        <div class="row index-row">
            <div class="col-md-12">
                <div class="row">
                    <div class="col-md-1"></div>
                    <div class="col-md-11">
                        <a href="{{ url_for('animated') }}"><img title="animated"
                                                                 class="index_image shade-hover"
                                                                 src="/static/img/anim_big.jpg"></a>
                        <a href="{{ url_for('still') }}"><img class="index_image shade-hover" title="still"
                                                              src="/static/img/still_big.jpg"></a>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-1"></div>
                    <div class="col-md-11">
                        <a href="{{ url_for('memories') }}"><img class="index_image shade-hover" title="memories"
                                                                 src="/static/img/mem_big.jpg"></a>
                        <a href="{{ url_for('vasili') }}"><img class="index_image shade-hover" title="vasili"
                                                               src="/static/img/vk_big.jpg"></a>
                    </div>
                </div>
            </div>

            <div class="col-md-2">
            </div>

            <div class="col-md-4">
                <div class="row">
                    <div class="col-md-9">
                    </div>
                    <div class="col-md-3">
                        {% for item in preview %}
                            <div class="row">
                                <div class="cartoon_item">
                                    <a href="{{ item.url }}"><img class="shade-hover" src="{{ item.img }}"
                                                                  width="100%"/></a>

                                    <div class="cartoon_desc">
                                        <a href="{{ item.url }}">{{ item.desc }}</a>
                                    </div>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
