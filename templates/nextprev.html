<div class="col-md-12 navigation global-header">
    {% if prev %}
        <div class="navprev">
            <img src="/static/img/arrow_left.jpg" width=10px></a>
            <a href="{{ prev.url }}"> {{ prev.name }}</a>
        </div>
    {% endif %}
    {% if next %}
        <div class="navnext">
            <a href="{{ next.url }}">{{ next.name }} </a>
            <img src="/static/img/arrow_right.jpg" width=10px></a>
        </div>
    {% endif %}
</div>
