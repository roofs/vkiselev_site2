{% extends "base.html" %}

{% block title %}Animated{% endblock %}
{% block content %}
    <div>Big menu</div>
    <div>This page menu</div>

    <div class="anim_section">cartoons</div>
    {% for item in cartoons %}
        <div class="col-md-2 cartoon_item">
            <a href="{{ item.url }}"><img src="{{ item.img }}" width="200px"/></a>

            <div class="cartoon_desc">
                {{ item.desc }}
            </div>
        </div>
    {% endfor %}

{% endblock %}
