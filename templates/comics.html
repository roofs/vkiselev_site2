{% extends "base.html" %}

{% block title %}{{ item.name }}{% endblock %}
{% block microformats %}
    <meta property="og:title" content="{{ item.name }}"/>
    <meta property="og:description" content="{{ item.og_desc }}"/>
    <meta property="og:image" content="http://{{ request.host }}{{ item.cover }}"/>
{% endblock %}
{% block content %}
    <div class="container">
        {% include 'still_header.html' %}

        <div class="padding-top-big"></div>
        <div class="row">
            <div class="col-md-6">
                <p>
                    <img src="{{ item.cover }}" width="100%">
                </p>
            </div>
            <div class="col-md-6 cartoon_item-text">
                {{ item.desc | safe }}
                <p>
                    {% include 'social_share_vertical.html' %}
                </p>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <p class="center-align">
                    {% for page in pages %}
                        <img src="{{ page }}" width="100%">
                    {% endfor %}
                </p>
            </div>
        </div>
    </div>
{% endblock %}
