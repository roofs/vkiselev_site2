{% extends "base.html" %}

{% block title %}{{ item.name }}{% endblock %}
{% block content %}
    <div class="container">
        {% include 'animated_header.html' %}


        <div class="padding-top-big"></div>
        <div class="container-fluid">
            <div class="row">
                <div class="col-md-9">
                    <p>
                        <iframe src="{{ item.youtube }}"
                                height="390"
                                {% if item.width %} width="{{ item.width }}" {% else %} width="640"  {% endif %}
                                frameborder="0" allowfullscreen>
                        </iframe>
                    </p>
                    <p>
                        {{ item.desc | safe }}
                    </p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
